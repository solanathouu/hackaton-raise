<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CONDUCTOR — console opérateur</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d1117'/%3E%3Ccircle cx='50' cy='50' r='22' fill='none' stroke='%23388bfd' stroke-width='7'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23f85149'/%3E%3C/svg%3E" />
  <meta name="theme-color" content="#0d1117" />
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --ok:#2ea043; --warn:#e3b341; --bad:#f85149; --txt:#e6edf3; --dim:#8b949e; --accent:#388bfd; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.45 -apple-system,system-ui,sans-serif; background:var(--bg); color:var(--txt); }
    header { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
    header h1 { font-size:15px; margin:0; letter-spacing:.5px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--bad); } .dot.on { background:var(--ok); }
    .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; }
    .badge.degraded { background:#3d2b0a; color:var(--warn); border:1px solid var(--warn); }
    .badge.live { background:#0f2d18; color:var(--ok); border:1px solid var(--ok); }
    main { display:grid; grid-template-columns:1fr 320px; gap:14px; padding:14px; max-width:1200px; margin:0 auto; }
    @media (max-width:800px){ main{ grid-template-columns:1fr; } }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:14px; }
    .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:0 0 10px; }
    select, button, input { font:inherit; color:var(--txt); background:#21262d; border:1px solid var(--line); border-radius:7px; padding:6px 9px; }
    button { cursor:pointer; } button:active { transform:scale(.98); }
    .alert { border:1px solid var(--warn); border-left:4px solid var(--warn); border-radius:9px; padding:11px; margin-bottom:9px; background:#1c160a; }
    .alert .m { font-weight:600; margin-bottom:9px; }
    .row { display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
    .accept { background:var(--ok); border:none; color:#fff; font-weight:700; }
    .reassign { background:var(--accent); border:none; color:#fff; font-weight:700; }
    .picker { margin-top:9px; padding-top:9px; border-top:1px dashed var(--line); }
    .inc { border-left:3px solid var(--accent); padding:10px; margin-bottom:9px; background:#0d1117; border-radius:8px; }
    .inc .h { font-weight:600; } .inc .j { color:var(--dim); font-style:italic; font-size:13px; margin:4px 0; }
    .inc .meta { font-size:11px; color:var(--dim); }
    .sev5 { color:var(--bad); font-weight:700; }
    .disp { font-size:13px; padding:5px 0; border-bottom:1px solid var(--line); display:flex; gap:6px; align-items:center; }
    .disp.witness { opacity:.5; } .disp.acked { color:var(--ok); }
    .tag { font-size:10px; padding:1px 6px; border-radius:5px; background:#21262d; border:1px solid var(--line); }
    .tag.primary { color:var(--accent); border-color:var(--accent); } .tag.backfill { color:var(--warn); } .tag.witness { color:var(--dim); }
    .zones { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .zone { border:1px solid var(--line); border-radius:8px; padding:7px; background:#0d1117; }
    .zone.ok { border-left:3px solid var(--ok); } .zone.sur { border-left:3px solid var(--accent); } .zone.bad { border-left:3px solid var(--bad); }
    .zone .n { font-size:11px; color:var(--dim); } .zone .h { font-size:17px; font-weight:700; }
    .zone .d { font-size:10px; color:var(--warn); }
    .demo button { font-size:12px; margin:2px; }
    .feed { max-height:150px; overflow:auto; } .feed div { font-size:12px; color:var(--dim); padding:3px 0; }
    .empty { color:var(--dim); font-size:13px; }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>CONSOLE OPÉRATEUR</h1>
    <span id="mode" class="badge" style="display:none"></span>
    <span style="flex:1"></span>
    <span id="clock" style="font-size:12px;color:var(--dim)"></span>
  </header>

  <main>
    <div>
      <div class="card">
        <h2>⚠ Alertes de couverture</h2>
        <div id="alerts"><p class="empty">Aucune alerte. Tout est couvert.</p></div>
      </div>
      <div class="card">
        <h2>Incidents</h2>
        <div id="incidents"><p class="empty">En attente d'un signalement…</p></div>
      </div>
      <div class="card">
        <h2>Dispatchs</h2>
        <div id="dispatches"><p class="empty">—</p></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Couverture des zones</h2>
        <div class="zones" id="zones"></div>
      </div>
      <div class="card demo">
        <h2>Démo</h2>
        <div class="row">
          <button data-tr="malaise au grand huit, une personne au sol" data-l="fr">S1</button>
          <button data-tr="arrêt cardiaque au manège extrême, il ne respire plus" data-l="fr">S2</button>
          <button data-tr="malaise à la zone enfants, personne inconsciente" data-l="fr">S3</button>
          <button data-tr="un hombre se desplomó en la entrada, no respira" data-l="es">S4</button>
          <button id="reset" style="background:#3d1a1a">reset</button>
        </div>
      </div>
      <div class="card">
        <h2>Journal opérateur</h2>
        <div class="feed" id="oplog"></div>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const $ = (s) => document.querySelector(s);
    let agents = [];               // dernier roster (pour les pickers)
    let alertSeq = 0;
    const density = new Map();     // zoneId -> payload BLE
    const acked = new Set();       // assignmentIds acquittés

    socket.on('connect', () => $('#dot').classList.add('on'));
    socket.on('disconnect', () => $('#dot').classList.remove('on'));
    setInterval(() => { $('#clock').textContent = new Date().toLocaleTimeString('fr-FR'); }, 1000);

    const agentLabel = (a) => `${a.id} · ${a.name}${a.is_reserve ? ' (R)' : ''} — ${a.current_zone} [${a.status}]`;
    function agentSelect(filterAvailable) {
      const list = filterAvailable ? agents.filter((a) => a.status === 'available') : agents;
      return `<select>${list.map((a) => `<option value="${a.id}">${agentLabel(a)}</option>`).join('')}</select>`;
    }

    // --- état / zones ---
    socket.on('state', (st) => {
      agents = st.agents;
      $('#zones').innerHTML = st.zones.map((z) => {
        const cls = z.headcount < z.required_min ? 'bad' : z.surplus > 0 ? 'sur' : 'ok';
        const d = density.get(z.id);
        return `<div class="zone ${cls}"><div class="n">${z.name}${z.required_skills.length ? ' · ' + z.required_skills.join(',') : ''}</div>
          <div class="h">${z.headcount}<span style="font-size:11px;color:var(--dim)">/${z.required_min}</span></div>
          ${d ? `<div class="d">👥 ${d.deviceCount}${d.ratio ? ` (x${d.ratio})` : ''}</div>` : ''}</div>`;
      }).join('');
    });
    socket.on('crowd_density', (p) => { if (p?.zoneId) density.set(p.zoneId, p); });

    // --- badge mode ---
    const mode = $('#mode');
    socket.on('incident', (i) => {
      if (i.degraded) { mode.className = 'badge degraded'; mode.textContent = '⚠ MODE DÉGRADÉ'; mode.style.display = ''; }
      else if (i.source?.startsWith('crusoe')) { mode.className = 'badge live'; mode.textContent = '🧠 Crusoe'; mode.style.display = ''; }
      renderIncident(i);
    });

    // --- alertes de couverture (F5) ---
    socket.on('coverage_warning', (w) => {
      const id = 'al_' + (++alertSeq);
      const box = $('#alerts'); if (box.querySelector('.empty')) box.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'alert'; el.id = id;
      el.innerHTML = `<div class="m">${w.message}</div>
        <div class="row">
          <button class="accept" onclick="acceptAlert('${id}','${w.zoneId}')">✓ Accepter</button>
          <button class="reassign" onclick="toggleReassign('${id}')">⇄ Réassigner</button>
        </div>
        <div class="picker" id="pk_${id}" style="display:none">
          Envoyer ${agentSelect(true)}
          <input id="rs_${id}" placeholder="raison (optionnel)" style="width:160px" />
          <button class="reassign" onclick="doReassign('${id}','${w.zoneId}')">Envoyer</button>
        </div>`;
      box.prepend(el);
    });
    window.acceptAlert = (id, zoneId) => { socket.emit('operator_action', { action: 'accept', zoneId }); $('#' + id)?.remove(); };
    window.toggleReassign = (id) => { const p = $('#pk_' + id); if (p) p.style.display = p.style.display === 'none' ? '' : 'none'; };
    window.doReassign = (id, zoneId) => {
      const el = $('#' + id); const agentId = el.querySelector('#pk_' + id + ' select').value; const reason = el.querySelector('#rs_' + id).value.trim();
      socket.emit('operator_action', { action: 'reassign', zoneId, agentId, reason });
      el.remove();
    };

    // --- incidents + override primary ---
    function renderIncident(i) {
      const box = $('#incidents'); if (box.querySelector('.empty')) box.innerHTML = '';
      const el = document.createElement('div'); el.className = 'inc';
      const sev = i.severity >= 5 ? `<span class="sev5">sévérité ${i.severity}</span>` : `sévérité ${i.severity ?? '?'}`;
      el.innerHTML = `<div class="h">${i.type || 'incident'} · ${i.zone_id} · ${sev} → primary <b>${i.primary_id}</b></div>
        ${i.justification ? `<div class="j">${i.justification}</div>` : ''}
        <div class="meta">${i.transcript ? '« ' + i.transcript + ' »' : ''}</div>
        <div class="row" style="margin-top:7px">
          <span style="font-size:12px;color:var(--dim)">override →</span>
          ${agentSelect(false)}
          <input placeholder="raison (ex: protège Marco)" style="width:150px" />
          <button class="reassign" onclick="overridePrimary(this,'${i.id}')">Réassigner</button>
        </div>`;
      box.prepend(el);
    }
    window.overridePrimary = (btn, incidentId) => {
      const el = btn.closest('.inc'); const newAgentId = el.querySelector('select').value; const reason = el.querySelector('input').value.trim();
      socket.emit('operator_override', { incidentId, newAgentId, reason });
    };

    // --- dispatchs + accusés ---
    socket.on('dispatch_log', (d) => {
      const box = $('#dispatches'); if (box.querySelector('.empty')) box.innerHTML = '';
      const el = document.createElement('div'); el.className = 'disp ' + d.role; el.id = 'ds_' + d.assignmentId;
      if (acked.has(d.assignmentId)) el.classList.add('acked');
      el.innerHTML = `<span class="tag ${d.role}">${d.role}</span> <b>${d.agentId}</b> → ${d.targetZone} <span style="color:var(--dim)">${d.text || ''}</span>`;
      box.prepend(el);
    });
    socket.on('ack_log', (a) => { acked.add(a.assignmentId); $('#ds_' + a.assignmentId)?.classList.add('acked'); oplog(`✅ ${a.agentId} a accusé`); });

    // --- journal opérateur ---
    const oplog = (t) => { const d = document.createElement('div'); d.textContent = `${new Date().toLocaleTimeString('fr-FR')} · ${t}`; $('#oplog').prepend(d); };
    socket.on('override_log', (o) => oplog(`✋ override → ${o.newAgentId}${o.reason ? ` (${o.reason})` : ''}`));
    socket.on('operator_log', (o) => oplog(o.action === 'accept' ? `☑ trou accepté (${o.zoneId})` : `⇄ renfort ${o.agentId} → ${o.zoneId}${o.reason ? ` (${o.reason})` : ''}`));

    // --- démo ---
    document.querySelectorAll('.demo button[data-tr]').forEach((b) => b.onclick = () => socket.emit('sim_incident', { transcript: b.dataset.tr, lang: b.dataset.l }));
    $('#reset').onclick = () => { socket.emit('reset'); $('#incidents').innerHTML = '<p class="empty">En attente…</p>'; $('#alerts').innerHTML = '<p class="empty">Aucune alerte.</p>'; $('#dispatches').innerHTML = '<p class="empty">—</p>'; $('#oplog').innerHTML = ''; mode.style.display = 'none'; };
  </script>
</body>
</html>
