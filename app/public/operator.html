<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CONDUCTOR · Operator console</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b0e13'/%3E%3Ccircle cx='50' cy='50' r='22' fill='none' stroke='%234cc2ff' stroke-width='7'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23ff5449'/%3E%3C/svg%3E" />
  <meta name="theme-color" content="#0b0e13" />
  <style>
    /* ==== Charte CONDUCTOR (commune staff / console / 3D) ====================
       Fond #0b0e13 · panneaux #11151c · accent UNIQUE #4cc2ff · ok/warn/bad
       sémantiques · données chiffrées en mono tabulaire · radius 10px. */
    :root {
      --bg:#0b0e13; --panel:#11151c; --panel2:#171c24; --line:#232a35;
      --txt:#e8edf4; --dim:#8b96a5; --accent:#4cc2ff;
      --ok:#2ea862; --warn:#e8b13f; --bad:#ff5449;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      --r:10px;
      --hairline: inset 0 1px 0 rgba(255,255,255,.06);
      --ease: cubic-bezier(.32,.72,0,1);
    }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.45 -apple-system, system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--txt); }

    header {
      display:flex; align-items:center; gap:12px; padding:12px 18px;
      background:linear-gradient(180deg, #131922, var(--panel));
      border-bottom:1px solid var(--line);
      box-shadow:var(--hairline), 0 4px 16px rgba(0,0,0,.25);
      position:sticky; top:0; z-index:5;
    }
    header h1 { font-size:13px; font-weight:800; letter-spacing:3px; margin:0; }
    header h1 span { color:var(--dim); font-weight:600; letter-spacing:1.5px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--bad); flex:none; transition:background .25s var(--ease), box-shadow .25s var(--ease); }
    .dot.on { background:var(--ok); box-shadow:0 0 8px rgba(46,168,98,.45); }
    #clock { font:600 13px var(--mono); color:var(--dim); font-variant-numeric:tabular-nums; }

    .badge { font-size:10px; font-weight:700; letter-spacing:.4px; padding:5px 9px; border-radius:6px; border:1px solid var(--line); }
    .badge.degraded { background:#33270d; color:var(--warn); border-color:var(--warn); }
    .badge.live { background:#0d2618; color:var(--ok); border-color:#1e5a3a; }
    .badge.demo {
      background:linear-gradient(135deg, #1a1533 0%, #251e45 100%);
      color:#d4c4ff; border-color:#6d28d9; letter-spacing:1.1px;
      box-shadow:0 0 14px rgba(109,40,217,.22), inset 0 1px 0 rgba(255,255,255,.06);
    }
    .badge.analysing { background:#0c2030; color:var(--accent); border-color:#1d4a63; animation:pulse 1.1s infinite; }
    .roster-toggle { display:flex; border:1px solid var(--line); border-radius:var(--r); overflow:hidden; flex:none; background:var(--panel2); }
    .roster-toggle button {
      font:700 10px/1 -apple-system, system-ui, sans-serif; padding:10px 12px; min-height:44px; min-width:44px;
      border:none; background:transparent; color:var(--dim); letter-spacing:.5px;
      transition:background .2s var(--ease), color .2s var(--ease);
    }
    .roster-toggle button.sel { background:#0c2030; color:var(--accent); box-shadow:inset 0 -2px 0 var(--accent); }
    .roster-toggle button[data-mode="demo"].sel { background:#1a1533; color:#d4c4ff; box-shadow:inset 0 -2px 0 #8b5cf6; }
    @keyframes pulse { 50% { opacity:.45; } }

    main { max-width:1280px; margin:0 auto; padding:14px 18px 24px; }

    /* ---- bandeau couverture pleine largeur (vision instantanée) ---- */
    .zones { display:grid; grid-template-columns:repeat(auto-fit, minmax(132px, 1fr)); gap:8px; margin-bottom:14px; }
    .zone {
      border:1px solid var(--line); border-radius:var(--r); padding:8px 10px;
      background:linear-gradient(180deg, #131922, var(--panel) 65%);
      box-shadow:var(--hairline), 0 4px 14px rgba(0,0,0,.22);
      transition:transform .2s var(--ease);
    }
    .zone.ok { border-bottom:2px solid var(--ok); } .zone.sur { border-bottom:2px solid var(--accent); } .zone.bad { border-bottom:2px solid var(--bad); animation:pulse 1.2s infinite; }
    .zone .n { font-size:10.5px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .zone .h { font:700 18px var(--mono); font-variant-numeric:tabular-nums; }
    .zone .h span { font-size:11px; color:var(--dim); font-weight:400; }
    .zone.bad .h { color:var(--bad); } .zone.sur .h { color:var(--txt); }
    .zone .d { font:600 10px var(--mono); color:var(--warn); }

    /* ---- 2 colonnes de travail ---- */
    .cols { display:grid; grid-template-columns:minmax(0, 1fr) 340px; gap:14px; align-items:start; }
    @media (max-width:860px){ .cols { grid-template-columns:1fr; } }

    .card {
      background:linear-gradient(180deg, #12171f, var(--panel) 60%);
      border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:14px;
      box-shadow:var(--hairline), 0 6px 22px rgba(0,0,0,.28);
    }
    .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:var(--dim); margin:0 0 10px; font-weight:700; }

    select, button, input {
      font:inherit; color:var(--txt); background:var(--panel2);
      border:1px solid var(--line); border-radius:var(--r); padding:7px 10px;
    }
    input::placeholder { color:#5d6875; }
    button { cursor:pointer; transition:transform .15s var(--ease); } button:active { transform:scale(.98); }
    .accept { background:linear-gradient(180deg, #27995a, #1e7a47); border:none; color:#fff; font-weight:700; box-shadow:inset 0 1px 0 rgba(255,255,255,.2); }
    .reassign { background:#0c2030; border:1px solid #1d4a63; color:var(--accent); font-weight:700; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    /* alertes F5 : l'objet le plus urgent de la console */
    .alert { border:1px solid #4a3a14; border-left:3px solid var(--warn); border-radius:var(--r); padding:12px; margin-bottom:9px; background:#191408; }
    .alert .m { font-weight:600; margin-bottom:10px; }
    .picker { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }

    .inc { border:1px solid var(--line); border-left:3px solid var(--accent); padding:12px; margin-bottom:9px; background:var(--bg); border-radius:var(--r); }
    .inc .h { font-weight:600; }
    .inc .h b { color:var(--accent); }
    .inc .j { color:var(--dim); font-style:italic; font-size:13px; margin:6px 0; line-height:1.5; }
    .inc .meta { font-size:11.5px; color:var(--dim); }
    .sev5 { color:var(--bad); font-weight:700; }

    .disp { font-size:13px; padding:6px 0; border-bottom:1px solid var(--line); display:flex; gap:7px; align-items:baseline; }
    .disp:last-child { border-bottom:none; }
    .disp.witness { opacity:.45; } .disp.acked { color:var(--ok); }
    .disp b { font-family:var(--mono); font-size:12.5px; }
    .tag { font:700 9.5px var(--mono); letter-spacing:.8px; text-transform:uppercase; padding:2px 6px; border-radius:5px; background:var(--panel2); border:1px solid var(--line); flex:none; }
    .tag.primary { color:var(--bad); border-color:#5c2320; } .tag.backfill { color:var(--accent); border-color:#1d4a63; } .tag.witness { color:var(--dim); }

    .demo button { font:600 12px/1 -apple-system, system-ui, sans-serif; padding:9px 11px; margin:2px; }
    #reset { background:#2a1210; border-color:#5c2320; }
    .feed { max-height:180px; overflow:auto; }
    .feed div { font:12px var(--mono); color:var(--dim); padding:4px 0; }
    .feed:empty::after { content:'No actions yet.'; color:var(--dim); font-size:13px; font-family:-apple-system, system-ui, sans-serif; }
    .empty { color:var(--dim); font-size:13px; }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>CONDUCTOR <span>· CONSOLE</span></h1>
    <span id="demoBadge" class="badge demo" style="display:none">DEMO TEAM</span>
    <span id="mode" class="badge" style="display:none"></span>
    <div class="roster-toggle" id="rosterToggle">
      <button type="button" data-mode="real" class="sel">Real</button>
      <button type="button" data-mode="demo">Demo</button>
    </div>
    <span style="flex:1"></span>
    <span id="clock"></span>
  </header>

  <main>
    <!-- bandeau couverture : les 10 zones d'un coup d'œil -->
    <div class="zones" id="zones"></div>

    <div class="cols">
      <div>
        <div class="card">
          <h2>Coverage alerts</h2>
          <div id="alerts"><p class="empty">No alerts. All zones covered.</p></div>
        </div>
        <div class="card">
          <h2>Incidents</h2>
          <div id="incidents"><p class="empty">Waiting for a voice report…</p></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>Dispatches</h2>
          <div id="dispatches"><p class="empty">No dispatches.</p></div>
        </div>
        <div class="card demo">
          <h2>Demo</h2>
          <div class="row">
            <button data-tr="malaise au grand huit, une personne au sol" data-l="fr">S1</button>
            <button data-tr="arrêt cardiaque au manège extrême, il ne respire plus" data-l="fr">S2</button>
            <button data-tr="malaise à la zone enfants, personne inconsciente" data-l="fr">S3</button>
            <button data-tr="un hombre se desplomó en la entrada, no respira" data-l="es">S4</button>
            <button id="reset">Reset</button>
          </div>
        </div>
        <div class="card">
          <h2>Operator log</h2>
          <div class="feed" id="oplog"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const $ = (s) => document.querySelector(s);
    let demoMode = localStorage.getItem('demoMode') === 'true';
    let rosterSynced = false;
    let agents = [];               // dernier roster (pour les pickers)
    let alertSeq = 0;
    const density = new Map();     // zoneId -> payload BLE
    const acked = new Set();       // assignmentIds acquittés

    function updateDemoUI() {
      $('#demoBadge').style.display = demoMode ? '' : 'none';
      document.querySelectorAll('#rosterToggle button').forEach((b) => {
        b.classList.toggle('sel', b.dataset.mode === (demoMode ? 'demo' : 'real'));
      });
    }
    function setDemoMode(on) {
      demoMode = !!on;
      localStorage.setItem('demoMode', demoMode ? 'true' : 'false');
      updateDemoUI();
      socket.emit('reset', { demo: demoMode });
      clearTimeout(analyseTimer);
      $('#incidents').innerHTML = '<p class="empty">Waiting for a voice report…</p>';
      $('#alerts').innerHTML = '<p class="empty">No alerts. All zones covered.</p>';
      $('#dispatches').innerHTML = '<p class="empty">No dispatches.</p>';
      $('#oplog').innerHTML = '';
      mode.style.display = 'none';
    }
    document.querySelectorAll('#rosterToggle button').forEach((b) => {
      b.onclick = () => {
        const next = b.dataset.mode === 'demo';
        if (next === demoMode) return;
        setDemoMode(next);
      };
    });
    updateDemoUI();

    socket.on('connect', () => $('#dot').classList.add('on'));
    socket.on('disconnect', () => $('#dot').classList.remove('on'));
    setInterval(() => { $('#clock').textContent = new Date().toLocaleTimeString('en-US'); }, 1000);

    const agentLabel = (a) => `${a.id} · ${a.name}${a.is_reserve ? ' (R)' : ''} · ${a.current_zone} [${a.status}]`;
    function agentSelect(filterAvailable) {
      const list = filterAvailable ? agents.filter((a) => a.status === 'available') : agents;
      return `<select>${list.map((a) => `<option value="${a.id}">${agentLabel(a)}</option>`).join('')}</select>`;
    }

    // --- état / zones ---
    socket.on('state', (st) => {
      if (!rosterSynced && st.demoMode !== demoMode) {
        rosterSynced = true;
        socket.emit('reset', { demo: demoMode });
        return;
      }
      rosterSynced = true;
      demoMode = !!st.demoMode;
      localStorage.setItem('demoMode', demoMode ? 'true' : 'false');
      updateDemoUI();
      agents = st.agents;
      $('#zones').innerHTML = st.zones.map((z) => {
        const cls = z.headcount < z.required_min ? 'bad' : z.surplus > 0 ? 'sur' : 'ok';
        const d = density.get(z.id);
        return `<div class="zone ${cls}"><div class="n">${z.name}${z.required_skills.length ? ' · ' + z.required_skills.join(',') : ''}</div>
          <div class="h">${z.headcount}<span>/${z.required_min}</span></div>
          ${d ? `<div class="d">BLE ${d.deviceCount}${d.ratio ? ` ×${d.ratio}` : ''}</div>` : ''}</div>`;
      }).join('');
    });
    socket.on('crowd_density', (p) => { if (p?.zoneId) density.set(p.zoneId, p); });

    // --- badge mode ---
    const mode = $('#mode');
    // Indicateur d'attente : Crusoe raisonne (~4-6 s) -> l'attente devient intentionnelle (grand écran).
    let analyseTimer = null;
    function analysing() {
      mode.className = 'badge analysing'; mode.textContent = 'Crusoe analyzing the park…'; mode.style.display = '';
      clearTimeout(analyseTimer); analyseTimer = setTimeout(() => { mode.style.display = 'none'; }, 20000);
    }
    socket.on('incident', (i) => {
      clearTimeout(analyseTimer);
      if (i.degraded) { mode.className = 'badge degraded'; mode.textContent = 'DEGRADED MODE'; mode.style.display = ''; }
      else if (i.source?.startsWith('crusoe')) { mode.className = 'badge live'; mode.textContent = i.model ? i.model.split('/').pop().split('-').slice(0, 2).join(' ') : 'Crusoe'; mode.style.display = ''; }
      renderIncident(i);
    });

    // --- alertes de couverture (F5) ---
    socket.on('coverage_warning', (w) => {
      const id = 'al_' + (++alertSeq);
      const box = $('#alerts'); if (box.querySelector('.empty')) box.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'alert'; el.id = id;
      el.innerHTML = `<div class="m">${w.message}</div>
        <div class="row">
          <button class="accept" onclick="acceptAlert('${id}','${w.zoneId}')">Accept</button>
          <button class="reassign" onclick="toggleReassign('${id}')">Reassign</button>
        </div>
        <div class="picker" id="pk_${id}" style="display:none">
          Send ${agentSelect(true)}
          <input id="rs_${id}" placeholder="reason (optional)" style="width:160px" />
          <button class="reassign" onclick="doReassign('${id}','${w.zoneId}')">Send</button>
        </div>`;
      box.prepend(el);
    });
    window.acceptAlert = (id, zoneId) => { socket.emit('operator_action', { action: 'accept', zoneId }); $('#' + id)?.remove(); };
    window.toggleReassign = (id) => { const p = $('#pk_' + id); if (p) p.style.display = p.style.display === 'none' ? '' : 'none'; };
    window.doReassign = (id, zoneId) => {
      const el = $('#' + id); const agentId = el.querySelector('#pk_' + id + ' select').value; const reason = el.querySelector('#rs_' + id).value.trim();
      socket.emit('operator_action', { action: 'reassign', zoneId, agentId, reason });
      el.remove();
    };

    // --- incidents + override primary ---
    function renderIncident(i) {
      const box = $('#incidents'); if (box.querySelector('.empty')) box.innerHTML = '';
      const el = document.createElement('div'); el.className = 'inc';
      const sev = i.severity >= 5 ? `<span class="sev5">severity ${i.severity}</span>` : `severity ${i.severity ?? '?'}`;
      el.innerHTML = `<div class="h">${i.type || 'incident'} · ${i.zone_id} · ${sev} → primary <b>${i.primary_id}</b></div>
        ${i.justification ? `<div class="j">${i.justification}</div>` : ''}
        <div class="meta">${i.transcript ? '« ' + i.transcript + ' »' : ''}</div>
        <div class="row" style="margin-top:8px">
          <span style="font-size:12px;color:var(--dim)">override →</span>
          ${agentSelect(false)}
          <input placeholder="reason (e.g. protect lead)" style="width:150px" />
          <button class="reassign" onclick="overridePrimary(this,'${i.id}')">Reassign</button>
        </div>`;
      box.prepend(el);
    }
    window.overridePrimary = (btn, incidentId) => {
      const el = btn.closest('.inc'); const newAgentId = el.querySelector('select').value; const reason = el.querySelector('input').value.trim();
      socket.emit('operator_override', { incidentId, newAgentId, reason });
    };

    // --- dispatchs + accusés ---
    socket.on('dispatch_log', (d) => {
      const box = $('#dispatches'); if (box.querySelector('.empty')) box.innerHTML = '';
      const el = document.createElement('div'); el.className = 'disp ' + d.role; el.id = 'ds_' + d.assignmentId;
      if (acked.has(d.assignmentId)) el.classList.add('acked');
      el.innerHTML = `<span class="tag ${d.role}">${d.role}</span> <b>${d.agentId} → ${d.targetZone}</b> <span style="color:var(--dim)">${d.text || ''}</span>`;
      box.prepend(el);
    });
    socket.on('ack_log', (a) => { acked.add(a.assignmentId); $('#ds_' + a.assignmentId)?.classList.add('acked'); oplog(`ack ${a.agentId}`); });

    // --- journal opérateur ---
    const oplog = (t) => { const d = document.createElement('div'); d.textContent = `${new Date().toLocaleTimeString('en-US')} · ${t}`; $('#oplog').prepend(d); };
    socket.on('override_log', (o) => oplog(`override → ${o.newAgentId}${o.reason ? ` (${o.reason})` : ''}`));
    socket.on('operator_log', (o) => oplog(o.action === 'accept' ? `gap accepted (${o.zoneId})` : `reinforcement ${o.agentId} → ${o.zoneId}${o.reason ? ` (${o.reason})` : ''}`));

    // --- démo ---
    document.querySelectorAll('.demo button[data-tr]').forEach((b) => b.onclick = () => { socket.emit('sim_incident', { transcript: b.dataset.tr, lang: b.dataset.l }); analysing(); });
    $('#reset').onclick = () => { socket.emit('reset', { demo: demoMode }); clearTimeout(analyseTimer); $('#incidents').innerHTML = '<p class="empty">Waiting for a voice report…</p>'; $('#alerts').innerHTML = '<p class="empty">No alerts. All zones covered.</p>'; $('#dispatches').innerHTML = '<p class="empty">No dispatches.</p>'; $('#oplog').innerHTML = ''; mode.style.display = 'none'; };
  </script>
</body>
</html>
