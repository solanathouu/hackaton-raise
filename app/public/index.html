<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>CONDUCTOR — staff</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d1117'/%3E%3Ccircle cx='50' cy='50' r='22' fill='none' stroke='%23388bfd' stroke-width='7'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23f85149'/%3E%3C/svg%3E" />
  <meta name="theme-color" content="#0d1117" />
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --ok:#2ea043; --warn:#e3b341; --bad:#f85149; --txt:#e6edf3; --dim:#8b949e; --accent:#388bfd; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font:15px/1.4 -apple-system,system-ui,sans-serif; background:var(--bg); color:var(--txt); }
    header { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
    header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
    header .dot { width:9px; height:9px; border-radius:50%; background:var(--bad); }
    header .dot.on { background:var(--ok); }
    select, button { font:inherit; color:var(--txt); background:#21262d; border:1px solid var(--line); border-radius:8px; padding:7px 10px; }
    button:active { transform:scale(.98); }
    main { display:grid; grid-template-columns:1fr; gap:12px; padding:12px; max-width:900px; margin:0 auto; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; }
    .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:0 0 10px; }
    .zones { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
    .zone { border:1px solid var(--line); border-radius:8px; padding:8px; background:#0d1117; }
    .zone .n { font-size:12px; color:var(--dim); }
    .zone .h { font-size:20px; font-weight:700; }
    .zone.ok { border-left:3px solid var(--ok); } .zone.sur { border-left:3px solid var(--accent); } .zone.bad { border-left:3px solid var(--bad); }
    .zone .sk { font-size:10px; color:var(--warn); }
    .ptt { width:100%; padding:22px; font-size:18px; font-weight:700; border-radius:14px; background:var(--bad); border:none; color:#fff; user-select:none; }
    .ptt.rec { background:#7d1a15; animation:pulse 1s infinite; }
    @keyframes pulse { 50% { opacity:.6; } }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .dispatch { border-left:3px solid var(--accent); padding:10px; margin-bottom:8px; background:#0d1117; border-radius:8px; }
    .dispatch.done { opacity:.5; border-color:var(--ok); }
    .dispatch .t { font-weight:600; margin-bottom:6px; }
    .dispatch .meta { font-size:11px; color:var(--dim); margin-bottom:8px; }
    .ackbtn { background:var(--ok); border:none; color:#fff; font-weight:700; }
    .feed div { font-size:13px; padding:6px 0; border-bottom:1px solid var(--line); }
    .feed .warn { color:var(--warn); } .feed .just { color:var(--dim); font-style:italic; }
    .demo button { font-size:12px; }
    .lang { display:flex; gap:4px; }
    .lang button.sel { background:var(--accent); border-color:var(--accent); }
    .badge { font-size:11px; font-weight:700; padding:4px 9px; border-radius:6px; }
    .badge.degraded { background:#3d2b0a; color:var(--warn); border:1px solid var(--warn); }
    .badge.live { background:#0f2d18; color:var(--ok); border:1px solid var(--ok); }
    .feed .cstr { color:var(--accent); }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>CONDUCTOR</h1>
    <span id="mode" class="badge" style="display:none"></span>
    <span style="flex:1"></span>
    <label style="font-size:12px;color:var(--dim)">Agent</label>
    <select id="who"></select>
  </header>

  <main>
    <div class="card">
      <h2>Signalement vocal</h2>
      <div class="lang" style="margin-bottom:8px">
        <span style="font-size:12px;color:var(--dim);align-self:center">Langue&nbsp;:</span>
        <button data-lang="fr" class="sel">FR</button><button data-lang="es">ES</button>
      </div>
      <button class="ptt" id="ptt">🎙️ Maintenir pour parler</button>
      <p style="font-size:11px;color:var(--dim);margin:8px 0 0">Micro nécessite HTTPS (mkcert). Sinon, utilise les boutons démo.</p>
    </div>

    <div class="card">
      <h2>Mes dispatchs</h2>
      <div id="dispatches"><p style="color:var(--dim);font-size:13px">Aucun pour l'instant.</p></div>
    </div>

    <div class="card">
      <h2>Couverture des zones</h2>
      <div class="zones" id="zones"></div>
    </div>

    <div class="card">
      <h2>Feed opérateur</h2>
      <div class="feed" id="feed"></div>
    </div>

    <div class="card demo">
      <h2>Démo (sans micro)</h2>
      <div class="row">
        <button data-tr="malaise au grand huit, une personne au sol" data-l="fr">S1 · surplus Z2</button>
        <button data-tr="arrêt cardiaque au manège extrême, il ne respire plus" data-l="fr">S2 · cascade Z8</button>
        <button data-tr="malaise à la zone enfants, personne inconsciente" data-l="fr">S3 · warning</button>
        <button data-tr="un hombre se desplomó en la entrada, no respira" data-l="es">S4 · réserviste ES</button>
        <button id="f8" style="background:#132a3d">F8 · protège Marco (override)</button>
        <button id="reset" style="background:#3d1a1a">reset</button>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let me = localStorage.getItem('me') || 'A7';
    let lang = 'fr';
    const $ = (s) => document.querySelector(s);

    socket.on('connect', () => { $('#dot').classList.add('on'); socket.emit('hello', { agentId: me }); });
    socket.on('disconnect', () => $('#dot').classList.remove('on'));

    // --- state / zones ---
    socket.on('state', (st) => {
      const who = $('#who');
      if (who.options.length !== st.agents.length) {
        who.innerHTML = st.agents.map(a => `<option value="${a.id}">${a.id} · ${a.name}${a.is_reserve?' (R)':''}</option>`).join('');
        who.value = me;
      }
      $('#zones').innerHTML = st.zones.map(z => {
        const cls = z.headcount < z.required_min ? 'bad' : z.surplus > 0 ? 'sur' : 'ok';
        return `<div class="zone ${cls}"><div class="n">${z.name}</div><div class="h">${z.headcount}<span style="font-size:12px;color:var(--dim)">/${z.required_min}</span></div>${z.required_skills.length?`<div class="sk">${z.required_skills.join(',')}</div>`:''}</div>`;
      }).join('');
    });

    $('#who').onchange = (e) => { me = e.target.value; localStorage.setItem('me', me); socket.emit('hello', { agentId: me }); $('#dispatches').innerHTML='<p style="color:var(--dim);font-size:13px">Aucun pour l\'instant.</p>'; };
    document.querySelectorAll('.lang button').forEach(b => b.onclick = () => { lang = b.dataset.lang; document.querySelectorAll('.lang button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); });

    // --- dispatch reçu (seulement pour moi) ---
    socket.on('dispatch', (d) => {
      const el = document.createElement('div');
      el.className = 'dispatch'; el.id = 'd_' + d.assignmentId;
      el.innerHTML = `<div class="t">${d.text}</div><div class="meta">${d.role} · ${d.targetZone} · ${d.lang}</div>
        <div class="row"><button class="ackbtn" onclick="ackIt('${d.assignmentId}')">✅ Je m'en occupe</button>
        ${d.audioUrl?`<button onclick="playAudio('${d.audioUrl}')">🔊 Écouter</button>`:''}</div>`;
      const box = $('#dispatches'); if (box.querySelector('p')) box.innerHTML=''; box.prepend(el);
      if (d.audioUrl) playAudio(d.audioUrl);
      if (navigator.vibrate) navigator.vibrate([120,60,120]);
    });
    window.ackIt = (id) => { socket.emit('ack', { assignmentId: id }); const el=$('#d_'+id); if(el) el.classList.add('done'); };
    window.playAudio = (url) => { new Audio(url).play().catch(()=>{}); };

    // --- feed opérateur ---
    const feed = (html, cls='') => { const d=document.createElement('div'); d.className=cls; d.innerHTML=html; $('#feed').prepend(d); };
    const mode = $('#mode');
    function setMode(i) {
      if (i.degraded) { mode.className = 'badge degraded'; mode.textContent = '⚠ MODE DÉGRADÉ (fallback local)'; mode.style.display = ''; }
      else if (i.source && i.source.startsWith('crusoe')) {
        mode.className = 'badge live';
        mode.textContent = i.model ? `🧠 ${i.model.split('/').pop()}` : '🧠 Crusoe';
        mode.style.display = '';
      }
    }
    let lastIncidentId = null;
    socket.on('incident', (i) => {
      lastIncidentId = i.id;
      setMode(i);
      feed(`<b>${i.type||'incident'}</b> · ${i.zone_id} · sévérité ${i.severity??'?'} → primary <b>${i.primary_id}</b>`);
      if (i.justification) feed(i.justification, 'just');
      if (i.constraints_applied?.length) feed(`🔒 contrainte respectée : ${i.constraints_applied.join(' · ')}`, 'cstr');
    });
    socket.on('coverage_warning', (w) => feed(`⚠ ${w.message}`, 'warn'));
    socket.on('ack_log', (a) => feed(`✅ ${a.agentId} a accusé ${a.assignmentId}`));
    socket.on('override_log', (o) => feed(`✋ override → ${o.newAgentId}${o.reason?` (${o.reason})`:''}`));

    // --- PTT micro ---
    let rec, chunks = [];
    async function startRec() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(stream); chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const b64 = await blob.arrayBuffer().then(buf => btoa(String.fromCharCode(...new Uint8Array(buf))));
          socket.emit('incident_audio', { agentId: me, audio: b64, ts: Date.now(), lang });
          stream.getTracks().forEach(t => t.stop());
        };
        rec.start(); $('#ptt').classList.add('rec'); $('#ptt').textContent = '● Enregistrement…';
      } catch (e) { alert('Micro bloqué : ' + e.message + '\nActive HTTPS (npm run certs) ou utilise les boutons démo.'); }
    }
    function stopRec() { if (rec && rec.state !== 'inactive') rec.stop(); $('#ptt').classList.remove('rec'); $('#ptt').textContent = '🎙️ Maintenir pour parler'; }
    const ptt = $('#ptt');
    ptt.addEventListener('mousedown', startRec); ptt.addEventListener('mouseup', stopRec);
    ptt.addEventListener('touchstart', (e)=>{e.preventDefault();startRec();}); ptt.addEventListener('touchend', (e)=>{e.preventDefault();stopRec();});

    // --- démo ---
    document.querySelectorAll('.demo button[data-tr]').forEach(b => b.onclick = () => socket.emit('sim_incident', { transcript: b.dataset.tr, lang: b.dataset.l }));
    $('#f8').onclick = () => {
      if (!lastIncidentId) return alert('Déclenche d\'abord un incident (ex : S2).');
      socket.emit('operator_override', { incidentId: lastIncidentId, newAgentId: 'A2', reason: 'protège Marco' });
      feed('✋ override : « protège Marco » → contrainte apprise. Relance S2 : le moteur ne ponctionnera plus Marco.', 'cstr');
    };
    $('#reset').onclick = () => { socket.emit('reset'); $('#feed').innerHTML=''; $('#mode').style.display='none'; };
  </script>
</body>
</html>
