<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>CONDUCTOR · Staff</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b0e13'/%3E%3Ccircle cx='50' cy='50' r='22' fill='none' stroke='%234cc2ff' stroke-width='7'/%3E%3Ccircle cx='50' cy='50' r='7' fill='%23ff5449'/%3E%3C/svg%3E" />
  <meta name="theme-color" content="#0b0e13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    /* ==== Charte CONDUCTOR ==================================================
       Fond #0b0e13 · panneaux #11151c · lignes #232a35 · accent UNIQUE #4cc2ff
       Statuts sémantiques : ok #2ea862 · warn #e8b13f · danger #ff5449
       Données chiffrées en mono tabulaire. Radius 10px partout, le PTT est le
       seul cercle. Offline-first : system fonts, zéro ressource réseau. */
    :root {
      --bg:#0b0e13; --panel:#11151c; --panel2:#171c24; --line:#232a35;
      --txt:#e8edf4; --dim:#8b96a5; --accent:#4cc2ff;
      --ok:#2ea862; --warn:#e8b13f; --bad:#ff5449;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      --r:10px;
      /* profondeur « hardware » : hairline interne + ombre ambiante diffuse + bezier physique */
      --hairline: inset 0 1px 0 rgba(255,255,255,.06);
      --elev: 0 10px 30px rgba(0,0,0,.35);
      --ease: cubic-bezier(.32,.72,0,1);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body { margin:0; font:15px/1.45 -apple-system, system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--txt); }

    /* ---- header ---- */
    header {
      display:flex; align-items:center; gap:10px; padding:12px 16px;
      padding-top:calc(12px + env(safe-area-inset-top));
      background:linear-gradient(180deg, #131922, var(--panel));
      border-bottom:1px solid var(--line);
      box-shadow:var(--hairline), 0 4px 16px rgba(0,0,0,.25);
      position:sticky; top:0; z-index:5;
    }
    header h1 { font-size:13px; font-weight:800; letter-spacing:3px; margin:0; }
    header .dot { width:8px; height:8px; border-radius:50%; background:var(--bad); flex:none; }
    header .dot.on { background:var(--ok); }
    #who {
      font:600 13px/1 -apple-system, system-ui, sans-serif; color:var(--accent);
      background:transparent; border:1px solid var(--line); border-radius:var(--r);
      padding:7px 8px; max-width:150px;
    }

    .badge { font-size:10px; font-weight:700; letter-spacing:.4px; padding:4px 8px; border-radius:6px; border:1px solid var(--line); white-space:nowrap; max-width:130px; overflow:hidden; text-overflow:ellipsis; }
    .badge.degraded { background:#33270d; color:var(--warn); border-color:var(--warn); }
    .badge.live { background:#0d2618; color:var(--ok); border-color:#1e5a3a; }
    .badge.analysing { background:#0c2030; color:var(--accent); border-color:#1d4a63; animation:pulse 1.1s infinite; }
    @keyframes pulse { 50% { opacity:.45; } }

    /* ---- vues ---- */
    main { max-width:640px; margin:0 auto; padding:16px 16px calc(76px + env(safe-area-inset-bottom)); }
    .view { display:none; }
    .view.on { display:block; }

    /* ---- vue RADIO : le talkie ---- */
    .ptt-stage { display:flex; flex-direction:column; align-items:center; padding:28px 0 20px; }
    /* double-bezel : coque externe (plateau) + bouton interne (verre) = bouton usiné */
    .ptt-shell {
      border-radius:50%; padding:11px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015) 60%);
      box-shadow:var(--hairline), 0 18px 50px rgba(0,0,0,.5);
      border:1px solid rgba(255,255,255,.05);
    }
    .ptt {
      width:min(60vw, 240px); height:min(60vw, 240px); border-radius:50%;
      background:radial-gradient(circle at 50% 34%, #1a222c, var(--panel) 72%);
      border:1px solid #2b3442; color:var(--txt);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
      user-select:none; touch-action:none; cursor:pointer;
      box-shadow:inset 0 1px 1px rgba(255,255,255,.09), inset 0 -14px 26px rgba(0,0,0,.35);
      transition:transform .18s var(--ease), border-color .25s var(--ease), background .25s var(--ease);
    }
    .ptt:active { transform:scale(.96); }
    .ptt .k { font-size:24px; font-weight:800; letter-spacing:4px; }
    .ptt .s { font-size:11px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
    .ptt.rec {
      border-color:var(--bad);
      background:radial-gradient(circle at 50% 38%, #3a1512, #200d0b 72%);
      animation:recring 1.1s infinite;
    }
    .ptt.rec .k { color:var(--bad); }
    @keyframes recring {
      0%   { box-shadow:0 0 0 0 rgba(255,84,73,.35), 0 12px 40px rgba(0,0,0,.45); }
      70%  { box-shadow:0 0 0 26px rgba(255,84,73,0), 0 12px 40px rgba(0,0,0,.45); }
      100% { box-shadow:0 0 0 0 rgba(255,84,73,0), 0 12px 40px rgba(0,0,0,.45); }
    }
    .ptt-hint { font-size:11px; color:var(--dim); margin-top:14px; text-align:center; transition:color .2s; }
    .ptt-hint.live { font-size:14px; font-weight:700; color:var(--accent); }
    .ptt-hint.warn { font-size:14px; font-weight:700; color:var(--warn); }

    /* ---- dispatchs (l'événement central) ---- */
    .dispatch {
      background:linear-gradient(180deg, #131922, var(--panel) 55%);
      border:1px solid var(--line); border-left:3px solid var(--accent);
      border-radius:var(--r); padding:16px; margin-bottom:10px;
      box-shadow:var(--hairline), var(--elev);
    }
    .dispatch.done { opacity:.45; border-left-color:var(--ok); }
    /* liseré cohérent avec le tag de rôle */
    .dispatch.primary { border-left-color:var(--bad); }
    .dispatch.backfill { border-left-color:var(--accent); }
    .dispatch.witness { border-left-color:var(--line); }
    .dispatch .meta { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .dispatch .tag { font:700 10px/1 var(--mono); letter-spacing:1px; text-transform:uppercase; padding:4px 7px; border-radius:6px; }
    .dispatch .tag.primary { background:#33130f; color:var(--bad); }
    .dispatch .tag.backfill { background:#0c2030; color:var(--accent); }
    .dispatch .tag.witness { background:var(--panel2); color:var(--dim); }
    .dispatch .zone { font:600 12px var(--mono); color:var(--dim); }
    .dispatch .t { font-size:17px; font-weight:600; line-height:1.4; margin-bottom:14px; }
    .dispatch .row { display:flex; gap:8px; }
    .ackbtn {
      /* vert assombri : blanc/vert passe WCAG AA (bouton critique, lisible au soleil) */
      flex:1; background:linear-gradient(180deg, #27995a, #1e7a47); border:none; color:#fff;
      font:700 15px/1 -apple-system, system-ui, sans-serif;
      letter-spacing:.5px; padding:15px; border-radius:var(--r);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 6px 18px rgba(0,0,0,.3);
      transition:transform .15s var(--ease);
    }
    .ackbtn:active { transform:scale(.975); }
    .replay { background:var(--panel2); border:1px solid var(--line); color:var(--txt); border-radius:var(--r); padding:0 16px; font:inherit; }
    .empty { color:var(--dim); font-size:13px; text-align:center; padding:18px 0; }

    /* ---- vue CARTE ---- */
    .card {
      background:linear-gradient(180deg, #12171f, var(--panel) 60%);
      border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:12px;
      box-shadow:var(--hairline), 0 6px 20px rgba(0,0,0,.25);
    }
    .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:var(--dim); margin:0 0 10px; font-weight:700; }
    .mapwrap { position:relative; width:100%; aspect-ratio:900/650; background:var(--bg); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; touch-action:none; }
    .mapwrap svg { width:100%; height:100%; display:block; cursor:grab; }
    .mapwrap svg:active { cursor:grabbing; }
    .znode { cursor:pointer; }
    .zlabel { font:700 13px var(--mono); fill:var(--txt); pointer-events:none; }
    .zsub { font:11px -apple-system, system-ui, sans-serif; fill:var(--dim); pointer-events:none; }
    .adotlabel { font:700 9px var(--mono); fill:#fff; pointer-events:none; }
    .edge { stroke:#1c232e; stroke-width:2; }
    .route { stroke:var(--accent); stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:10 8; animation:dash 1s linear infinite; }
    @keyframes dash { to { stroke-dashoffset:-18; } }
    .routebanner { display:none; margin-top:10px; padding:12px; background:#0c2030; border:1px solid #1d4a63; border-radius:var(--r); }
    .routebanner.on { display:block; }
    .hint { font-size:11px; color:var(--dim); margin-top:8px; }
    .zones { display:grid; grid-template-columns:repeat(auto-fill, minmax(112px, 1fr)); gap:8px; }
    .zone { border:1px solid var(--line); border-radius:var(--r); padding:9px 10px; background:var(--bg); }
    .zone .n { font-size:11px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .zone .h { font:700 19px var(--mono); font-variant-numeric:tabular-nums; }
    .zone .h span { font-size:12px; color:var(--dim); font-weight:400; }
    .zone.ok { border-left:3px solid var(--ok); } .zone.sur { border-left:3px solid var(--accent); } .zone.bad { border-left:3px solid var(--bad); }
    .zone .sk { font:600 10px var(--mono); color:var(--warn); }
    .zone .ble { font:600 10px var(--mono); color:var(--accent); margin-top:3px; }

    /* ---- vue PLUS ---- */
    .feed div { font-size:13px; padding:7px 0; border-bottom:1px solid var(--line); }
    .feed div:last-child { border-bottom:none; }
    .feed .warn { color:var(--warn); } .feed .just { color:var(--dim); font-style:italic; } .feed .cstr { color:var(--accent); }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .demo button, .lang button {
      font:600 12px/1 -apple-system, system-ui, sans-serif; color:var(--txt);
      background:var(--panel2); border:1px solid var(--line); border-radius:var(--r); padding:10px 12px;
    }
    .demo button:active, .lang button:active { transform:scale(.97); }
    .lang button.sel { background:#0c2030; border-color:var(--accent); color:var(--accent); }
    #f8 { border-color:#1d4a63; }
    #reset { background:#2a1210; border-color:#5c2320; }

    /* ---- nav bas (3 vues) ---- */
    nav {
      position:fixed; left:0; right:0; bottom:0; z-index:6;
      display:flex; background:rgba(13, 17, 23, .92); backdrop-filter:blur(10px);
      border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom);
    }
    nav button {
      flex:1; background:none; border:none; border-top:2px solid transparent;
      color:var(--dim); font:700 11px/1 -apple-system, system-ui, sans-serif;
      letter-spacing:2px; padding:15px 0 13px;
    }
    nav button.on { color:var(--accent); border-top-color:var(--accent); }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>CONDUCTOR</h1>
    <span id="mode" class="badge" style="display:none"></span>
    <span style="flex:1"></span>
    <select id="who"></select>
  </header>

  <main>
    <!-- ============ VUE RADIO (défaut, le talkie) ============ -->
    <section class="view on" id="view-radio">
      <div class="ptt-stage">
        <div class="ptt-shell">
          <button class="ptt" id="ptt"><span class="k">TAP</span><span class="s">to talk</span></button>
        </div>
        <p class="ptt-hint" id="ptthint">Tap to talk · speak the emergency · tap again to send.</p>
      </div>
      <div id="dispatches"><p class="empty">No dispatch yet.</p></div>
    </section>

    <!-- ============ VUE CARTE ============ -->
    <section class="view" id="view-map">
      <div class="card">
        <h2>Site map</h2>
        <div class="mapwrap">
          <svg id="map" viewBox="0 0 900 650" preserveAspectRatio="xMidYMid meet">
            <g id="mapg">
              <g id="edges"></g>
              <g id="routeg"></g>
              <g id="znodes"></g>
              <g id="adots"></g>
            </g>
          </svg>
        </div>
        <div class="routebanner" id="routebanner"></div>
        <p class="hint">You are: <b id="myzone">…</b>. Tap a zone to position yourself. After "I've got it", your route shows here.</p>
      </div>
      <div class="card">
        <h2>Zone coverage</h2>
        <div class="zones" id="zones"></div>
      </div>
    </section>

    <!-- ============ VUE PLUS (journal, démo, réglages) ============ -->
    <section class="view" id="view-more">
      <div class="card">
        <h2>Report language</h2>
        <div class="lang">
          <button data-lang="en" class="sel">EN</button>
        </div>
      </div>
      <div class="card demo">
        <h2>Demo without mic</h2>
        <div class="row">
          <button data-tr="person collapsed at the roller coaster, someone on the ground" data-l="en">S1 · surplus Z2</button>
          <button data-tr="cardiac arrest at the extreme ride, he's not breathing" data-l="en">S2 · cascade Z8</button>
          <button data-tr="person collapsed at the kids zone, someone unconscious" data-l="en">S3 · warning</button>
          <button data-tr="a man collapsed at the entrance, he's not breathing" data-l="en">S4 · reservist</button>
          <button id="f8">F8 · protect Ibra</button>
          <button id="reset">Reset</button>
        </div>
      </div>
      <div class="card">
        <h2>Log</h2>
        <div class="feed" id="feed"></div>
      </div>
    </section>
  </main>

  <nav>
    <button class="on" data-view="radio">RADIO</button>
    <button data-view="map">MAP</button>
    <button data-view="more">MORE</button>
  </nav>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    // ?agent=A6 : préconfigure le profil du téléphone par l'URL (un lien par téléphone),
    // persisté ensuite — plus besoin de toucher le menu à chaque ouverture.
    const qsAgent = new URLSearchParams(location.search).get('agent');
    if (qsAgent) localStorage.setItem('me', qsAgent.toUpperCase());
    let me = (qsAgent && qsAgent.toUpperCase()) || localStorage.getItem('me') || 'A7';
    let lang = 'en';
    let lastState = null;
    const crowdByZone = {};
    const $ = (s) => document.querySelector(s);

    // --- navigation 3 vues (radio / carte / plus) ---
    function switchView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('on', v.id === 'view-' + name));
      document.querySelectorAll('nav button').forEach(b => b.classList.toggle('on', b.dataset.view === name));
    }
    document.querySelectorAll('nav button').forEach(b => b.onclick = () => switchView(b.dataset.view));

    function renderZones(st) {
      if (!st?.zones) return;
      $('#zones').innerHTML = st.zones.map(z => {
        const cls = z.headcount < z.required_min ? 'bad' : z.surplus > 0 ? 'sur' : 'ok';
        const ble = crowdByZone[z.id];
        const bleHtml = ble
          ? `<div class="ble">BLE ${ble.deviceCount}${ble.ratio ? ` ×${ble.ratio}` : ''}</div>`
          : '';
        return `<div class="zone ${cls}"><div class="n">${z.name}</div><div class="h">${z.headcount}<span>/${z.required_min}</span></div>${z.required_skills.length?`<div class="sk">${z.required_skills.join(',')}</div>`:''}${bleHtml}</div>`;
      }).join('');
    }

    // --- Carte du site (coords UI-locales ; graphe/Dijkstra client à partir de l'adjacence du state) ---
    const ZONES_XY = { Z1:[450,580], Z2:[200,150], Z3:[700,180], Z4:[780,350], Z5:[450,350], Z6:[180,400], Z7:[280,500], Z8:[350,120], Z9:[550,500], Z10:[650,600] };
    let ZGRAPH = null;
    function buildGraph(zones) {
      const g = new Map(zones.map(z => [z.id, new Map()]));
      for (const z of zones) for (const e of z.adjacency || []) { g.get(z.id).set(e.z, e.t); if (!g.has(e.z)) g.set(e.z, new Map()); g.get(e.z).set(z.id, e.t); }
      return g;
    }
    function shortestRoute(from, to) {
      if (!ZGRAPH || from === to) return { path: [from], sec: 0 };
      const dist = new Map([[from, 0]]), prev = new Map(), seen = new Set();
      for (;;) { let cur = null, cd = Infinity; for (const [id, d] of dist) if (!seen.has(id) && d < cd) { cur = id; cd = d; } if (cur === null || cur === to) break; seen.add(cur); for (const [n, w] of ZGRAPH.get(cur) || []) { const c = cd + w; if (c < (dist.get(n) ?? Infinity)) { dist.set(n, c); prev.set(n, cur); } } }
      if (!dist.has(to)) return null;
      const path = [to]; let n = to; while (n !== from) { n = prev.get(n); if (n === undefined) return null; path.unshift(n); }
      return { path, sec: dist.get(to) };
    }
    const fmtSec = (s) => { const m = Math.floor(s / 60), x = Math.round(s % 60); return m ? (x ? `${m}min${String(x).padStart(2,'0')}` : `${m}min`) : `${x}s`; };

    function renderMap(st) {
      if (!st?.zones) return;
      if (!ZGRAPH) ZGRAPH = buildGraph(st.zones);
      const edges = [], seen = new Set();
      for (const z of st.zones) { const a = ZONES_XY[z.id]; if (!a) continue; for (const e of z.adjacency || []) { const k = [z.id, e.z].sort().join('-'); if (seen.has(k)) continue; seen.add(k); const b = ZONES_XY[e.z]; if (b) edges.push(`<line class="edge" x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"/>`); } }
      $('#edges').innerHTML = edges.join('');
      $('#znodes').innerHTML = st.zones.map(z => { const p = ZONES_XY[z.id]; if (!p) return ''; const col = z.headcount < z.required_min ? '#ff5449' : z.surplus > 0 ? '#4cc2ff' : '#2ea862'; return `<g class="znode" data-zone="${z.id}"><circle cx="${p[0]}" cy="${p[1]}" r="34" fill="${col}22" stroke="${col}" stroke-width="3"/><text class="zlabel" x="${p[0]}" y="${p[1]+1}" text-anchor="middle">${z.headcount}/${z.required_min}</text><text class="zsub" x="${p[0]}" y="${p[1]+46}" text-anchor="middle">${z.name}</text></g>`; }).join('');
      const cnt = {};
      $('#adots').innerHTML = st.agents.map(a => { const p = ZONES_XY[a.current_zone]; if (!p) return ''; const i = (cnt[a.current_zone] = (cnt[a.current_zone] || 0) + 1) - 1; const ang = i * 2.39996, rr = i ? 50 : 0; const x = p[0] + Math.cos(ang) * rr, y = p[1] + Math.sin(ang) * rr; const col = a.status === 'available' ? '#2ea862' : (a.status === 'responding' || a.status === 'backfilling') ? '#e8b13f' : '#8b96a5'; return `<g><circle cx="${x}" cy="${y}" r="9" fill="${col}" stroke="#0b0e13" stroke-width="2"/><text class="adotlabel" x="${x}" y="${y+3}" text-anchor="middle">${a.id.replace(/[AR]/,'')}</text></g>`; }).join('');
      const meA = st.agents.find(a => a.id === me); $('#myzone').textContent = meA ? (st.zones.find(z => z.id === meA.current_zone)?.name || meA.current_zone) : '…';
    }

    // pan/zoom (conversion px écran -> unités SVG pour un drag correct)
    const vt = { x: 0, y: 0, k: 1 }; let drag = null, dragged = false;
    const applyVT = () => $('#mapg').setAttribute('transform', `translate(${vt.x} ${vt.y}) scale(${vt.k})`);
    const mapSvg = $('#map');
    mapSvg.addEventListener('wheel', (e) => { e.preventDefault(); vt.k = Math.min(3, Math.max(0.6, vt.k * (e.deltaY < 0 ? 1.1 : 0.9))); applyVT(); }, { passive: false });
    mapSvg.addEventListener('pointerdown', (e) => { drag = { x: e.clientX, y: e.clientY, vx: vt.x, vy: vt.y }; dragged = false; });
    mapSvg.addEventListener('pointermove', (e) => { if (!drag) return; const r = mapSvg.getBoundingClientRect(); const s = 900 / r.width; const dx = (e.clientX - drag.x) * s, dy = (e.clientY - drag.y) * s; if (Math.abs(dx) + Math.abs(dy) > 6) dragged = true; vt.x = drag.vx + dx; vt.y = drag.vy + dy; applyVT(); });
    mapSvg.addEventListener('pointerup', () => { drag = null; });
    // tap zone -> position
    $('#znodes').addEventListener('click', (e) => { if (dragged) { dragged = false; return; } const g = e.target.closest('.znode'); if (!g) return; socket.emit('position', { agentId: me, zoneId: g.dataset.zone }); feed(`📍 Position: ${g.dataset.zone}`); });

    // itinéraire post-accusé
    function showRoute(target) {
      const st = lastState, meA = st?.agents.find(a => a.id === me); if (!meA) return;
      const r = shortestRoute(meA.current_zone, target); if (!r) return;
      $('#routeg').innerHTML = `<polyline class="route" points="${r.path.map(z => ZONES_XY[z] ? ZONES_XY[z].join(',') : '').filter(Boolean).join(' ')}"/>`;
      const names = r.path.map(z => st.zones.find(x => x.id === z)?.name || z).join(' → ');
      $('#routebanner').innerHTML = `<div style="font-weight:600">Route to ${st.zones.find(x => x.id === target)?.name || target}</div><div style="font-size:12px;color:var(--dim);margin:5px 0 9px">${names} · ~${fmtSec(r.sec)}</div><button class="ackbtn" onclick="arrived('${target}')">Arrived on site</button>`;
      $('#routebanner').classList.add('on');
    }
    window.arrived = (target) => { socket.emit('position', { agentId: me, zoneId: target }); $('#routebanner').classList.remove('on'); $('#routeg').innerHTML = ''; feed(`📍 Arrived: ${target}`); switchView('radio'); };

    socket.on('connect', () => { $('#dot').classList.add('on'); socket.emit('hello', { agentId: me }); });
    socket.on('disconnect', () => $('#dot').classList.remove('on'));

    // --- state / zones ---
    socket.on('state', (st) => {
      lastState = st;
      const who = $('#who');
      if (who.options.length !== st.agents.length) {
        who.innerHTML = st.agents.map(a => `<option value="${a.id}">${a.id} · ${a.name}${a.is_reserve?' (R)':''}</option>`).join('');
        who.value = me;
      }
      renderZones(st);
      renderMap(st);
    });

    socket.on('crowd_density', (p) => {
      crowdByZone[p.zoneId] = p;
      if (lastState) renderZones(lastState);
      const hot = p.ratio && p.ratio >= 1.5;
      feed(`📡 BLE sensor · ${p.zoneId}: ${p.deviceCount} devices${p.ratio ? ` (×${p.ratio} vs normal)` : ''}`, hot ? 'warn' : '');
    });

    $('#who').onchange = (e) => { me = e.target.value; localStorage.setItem('me', me); socket.emit('hello', { agentId: me }); $('#dispatches').innerHTML='<p class="empty">No dispatch yet.</p>'; };
    document.querySelectorAll('.lang button').forEach(b => b.onclick = () => { lang = b.dataset.lang; document.querySelectorAll('.lang button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); });

    // --- dispatch reçu (seulement pour moi) : retour vue RADIO, c'est l'événement central ---
    socket.on('dispatch', (d) => {
      // Un re-route du même incident+rôle remplace l'ancienne consigne : on grise les cartes
      // obsolètes pour qu'il n'y ait toujours qu'UNE action verte possible.
      document.querySelectorAll(`#dispatches .dispatch[data-inc="${d.incidentId}"][data-role="${d.role}"]`)
        .forEach((old) => old.classList.add('done'));
      const el = document.createElement('div');
      el.className = 'dispatch ' + (d.role || '');
      el.id = 'd_' + d.assignmentId;
      el.dataset.inc = d.incidentId; el.dataset.role = d.role;
      el.innerHTML = `<div class="meta"><span class="tag ${d.role}">${d.role}</span><span class="zone">${d.targetZone} · ${d.lang}</span></div>
        <div class="t">${d.text}</div>
        <div class="row"><button class="ackbtn" onclick="ackIt('${d.assignmentId}','${d.targetZone}')">I've got it</button>
        ${d.audioUrl?`<button class="replay" onclick="playAudio('${d.audioUrl}')">Replay</button>`:''}</div>`;
      const box = $('#dispatches'); if (box.querySelector('.empty')) box.innerHTML='';
      box.prepend(el);
      if (d.audioUrl) playAudio(d.audioUrl);
      if (navigator.vibrate) navigator.vibrate([120,60,120]);
      switchView('radio');
    });
    window.ackIt = (id, target) => { socket.emit('ack', { assignmentId: id }); const el=$('#d_'+id); if(el) el.classList.add('done'); if (target) { showRoute(target); switchView('map'); } };
    window.playAudio = (url) => { new Audio(url).play().catch(()=>{}); };

    // --- feed opérateur ---
    const feed = (html, cls='') => { const d=document.createElement('div'); d.className=cls; d.innerHTML=html; $('#feed').prepend(d); };
    const mode = $('#mode');
    function setMode(i) {
      if (i.degraded) { mode.className = 'badge degraded'; mode.textContent = 'DEGRADED MODE'; mode.style.display = ''; }
      else if (i.source && i.source.startsWith('crusoe')) {
        mode.className = 'badge live';
        // label court : « Deepseek V4 » (le nom complet tronquait mi-mot sur mobile)
        mode.textContent = i.model ? i.model.split('/').pop().split('-').slice(0, 2).join(' ') : 'Crusoe';
        mode.style.display = '';
      }
    }
    // Indicateur d'attente : Crusoe raisonne (~4-6 s) -> l'attente devient intentionnelle, pas un temps mort.
    // Écrasé par setMode() à l'arrivée de l'incident ; garde-fou 20 s si rien n'arrive.
    let analyseTimer = null;
    function analysing() {
      mode.className = 'badge analysing'; mode.textContent = 'Crusoe analyzing…'; mode.style.display = '';
      clearTimeout(analyseTimer); analyseTimer = setTimeout(() => { mode.style.display = 'none'; }, 20000);
    }
    let lastIncidentId = null;
    socket.on('incident', (i) => {
      clearTimeout(analyseTimer);
      lastIncidentId = i.id;
      setMode(i);
      setHint(`✅ ${(i.type||'incident').replace(/_/g,' ')} → ${i.primary_id}`, 'live');
      feed(`<b>${(i.type||'incident').replace(/_/g,' ')}</b> · ${i.zone_id} · severity ${i.severity??'?'} → primary <b>${i.primary_id}</b>`);
      if (i.justification) feed(i.justification, 'just');
      if (i.constraints_applied?.length) feed(`🔒 constraint respected: ${i.constraints_applied.join(' · ')}`, 'cstr');
    });
    socket.on('coverage_warning', (w) => feed(`⚠ ${w.message}`, 'warn'));
    socket.on('ack_log', (a) => feed(`✅ ${a.agentId} acknowledged ${a.assignmentId}`));
    socket.on('override_log', (o) => feed(`✋ override → ${o.newAgentId}${o.reason?` (${o.reason})`:''}`));
    socket.on('error_msg', (m) => { mode.style.display = 'none'; const msg = m.message || 'Didn\'t catch that — please repeat.'; setHint('⚠️ ' + msg, 'warn'); feed('🎙️ ' + msg, 'warn'); pttLabel('TAP', 'to talk'); });

    // --- PTT micro ---
    let rec, chunks = [], recording = false;
    const pttLabel = (k, s) => { $('#ptt').innerHTML = `<span class="k">${k}</span><span class="s">${s}</span>`; };
    const setHint = (t, cls = '') => { const h = $('#ptthint'); if (h) { h.textContent = t; h.className = 'ptt-hint' + (cls ? ' ' + cls : ''); } };
    // base64 par blocs : évite un RangeError sur les longs enregistrements (spread d'un gros Uint8Array).
    const toB64 = (buf) => { const b = new Uint8Array(buf); let s = ''; const CH = 0x8000; for (let i = 0; i < b.length; i += CH) s += String.fromCharCode.apply(null, b.subarray(i, i + CH)); return btoa(s); };
    // TAP-TO-TALK : 1 tap = démarre, 2e tap = envoie (le maintien tactile iOS est trop peu fiable).
    async function startRec() {
      recording = true; $('#ptt').classList.add('rec'); pttLabel('🔴 REC', 'tap to send'); setHint('🔴 Recording — speak, then tap to send', 'live');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        if (!recording) { stream.getTracks().forEach(t => t.stop()); return; } // annulé pendant l'attente micro
        rec = new MediaRecorder(stream); chunks = [];
        rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
        rec.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          stream.getTracks().forEach(t => t.stop());
          if (blob.size < 8000) { setHint('⚠️ Too short — tap, speak ~2s, tap again', 'warn'); pttLabel('TAP', 'to talk'); return; }
          try {
            socket.emit('incident_audio', { agentId: me, audio: toB64(await blob.arrayBuffer()), ts: Date.now(), lang });
            setHint('⏳ Sent — Crusoe is analyzing…', 'live'); analysing();
          } catch (err) { setHint('⚠️ Send failed — try again', 'warn'); pttLabel('TAP', 'to talk'); }
        };
        rec.start(250);
      } catch (e) { recording = false; $('#ptt').classList.remove('rec'); pttLabel('TAP', 'to talk'); setHint('Tap to talk · speak · tap to send'); alert('Mic blocked: ' + e.message + '\nEnable HTTPS (npm run certs) or use the demo buttons (MORE tab).'); }
    }
    function stopRec() {
      recording = false; $('#ptt').classList.remove('rec'); pttLabel('TAP', 'to talk');
      if (rec && rec.state !== 'inactive') rec.stop();
    }
    const ptt = $('#ptt');
    ptt.addEventListener('click', (e) => { e.preventDefault(); recording ? stopRec() : startRec(); });

    // --- démo ---
    document.querySelectorAll('.demo button[data-tr]').forEach(b => b.onclick = () => { socket.emit('sim_incident', { transcript: b.dataset.tr, lang: b.dataset.l }); analysing(); switchView('radio'); });
    $('#f8').onclick = () => {
      if (!lastIncidentId) return alert('Trigger an incident first (e.g. S2).');
      socket.emit('operator_override', { incidentId: lastIncidentId, newAgentId: 'NATHAN', reason: 'protect Ibra' });
      feed('✋ override: "protect Ibra" → constraint learned. Re-run S2: the engine will no longer pull Ibra.', 'cstr');
    };
    $('#reset').onclick = () => { socket.emit('reset'); $('#feed').innerHTML=''; $('#mode').style.display='none'; };
  </script>
</body>
</html>
